#
# User overrides for the Charybdis RIGHT half (the half with the PMW3360 trackball).
# Hardware enablement (CONFIG_PMW3360=y, SPI, etc.) lives in the shield defaults at
# boards/shields/charybdis/charybdis_right.conf. This file holds tuning overrides
# that are layered on top at build time. Right-half only, so the sensor symbols are
# never applied to the left build.

# Trackball sensitivity: effective CPI = CONFIG_PMW3360_CPI / CONFIG_PMW3360_CPI_DIVIDOR
# (dividor defaults to 4). Default 1600/4 = ~400 effective CPI; 3200 doubles it to ~800.
# Range 100-12000.
CONFIG_PMW3360_CPI=3200

# Rotate trackball movement 90 degrees clockwise.
CONFIG_PMW3360_ORIENTATION_90=y

# Reduce Bluetooth pointer latency. The trackball is on this (central) half, which
# also holds the host connection. ZMK's default peripheral latency is 30 (the device
# may skip up to 30 connection events to save power), which batches/delays trackball
# motion over BLE -> "smooth but laggy". 0 = respond every interval; pin the interval
# to 7.5 ms. Tradeoff: higher idle battery drain. Relax MAX_INT toward 12 if needed.
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=6
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400
