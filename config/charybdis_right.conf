# User overrides for the Charybdis RIGHT half (the half with the PMW3360 trackball).
# Hardware enablement (CONFIG_PMW3360=y, SPI, etc.) lives in the shield defaults at
# boards/shields/charybdis/charybdis_right.conf. This file holds tuning overrides
# that are layered on top at build time. Right-half only, so the sensor symbols are
# never applied to the left build.

# Trackball sensitivity. Effective CPI = CONFIG_PMW3360_CPI / CONFIG_PMW3360_CPI_DIVIDOR.
# Use dividor=1 (no integer-division loss -> smoother at low speed) with CPI=800 for
# ~800 effective CPI. Raise CPI for more sensitivity (range 100-12000).
CONFIG_PMW3360_CPI=800
CONFIG_PMW3360_CPI_DIVIDOR=1

# Rotate trackball movement 90 degrees clockwise.
CONFIG_PMW3360_ORIENTATION_90=y

# Correct the horizontal (left/right) axis after the 90 deg rotation.
CONFIG_PMW3360_INVERT_X=y

# Throttle motion reports to ~100 Hz (custom skayred driver fork, see config/west.yml).
# The stock driver reports on every motion interrupt, flooding the BLE link and causing
# lag/stutter; the tp-sofle trackpoint avoids this by being pinned to 40 Hz. Higher ms =
# fewer reports (raise toward 16-25 if BLE still lags); 0 = unlimited.
CONFIG_PMW3360_REPORT_RATE_MS=10

# NOTE: no BLE connection-param overrides here, on purpose. Tightening them (latency 0 /
# fixed interval) did not fix the lag and caused stutter on this split central; the report
# throttle above is the actual fix. ZMK BLE defaults match the smooth tp-sofle setup.
